version: 2

project_name: gocode

builds:
  - main: ./cmd/gocode
    binary: gocode
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: gocode
      name: homebrew-tap
    homepage: "https://github.com/AlleyBo55/gocode"
    description: "Agent harness runtime — a Go port of Claude Code"
    license: "MIT"
    install: |
      bin.install "gocode"
